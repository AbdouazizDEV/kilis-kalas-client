<ion-grid class="trip-route-summary">
  <ion-row class="trip-route-summary__row">
    <ion-col size="auto" class="trip-route-summary__track-col">
      <ion-grid class="trip-route-summary__track">
        <ion-row class="trip-route-summary__track-inner">
          <ion-col size="auto" class="trip-route-summary__pickup-dot-col" aria-hidden="true"></ion-col>
          <ion-col size="auto" class="trip-route-summary__connector-col" aria-hidden="true"></ion-col>
          <ion-col size="auto" class="trip-route-summary__destination-icon-col" aria-hidden="true">
            <ion-img
              src="assets/icon/pin-location-dark.svg"
              alt=""
              class="trip-route-summary__destination-icon"
            ></ion-img>
          </ion-col>
        </ion-row>
      </ion-grid>
    </ion-col>

    <ion-col class="trip-route-summary__labels-col">
      <ion-row class="trip-route-summary__line">
        <ion-col size="12">
          <ion-text class="trip-route-summary__label">{{ 'RIDE_TRACKING.DEPARTURE' | translate }}</ion-text>
          <ion-text class="trip-route-summary__value">{{ pickupLabel }}</ion-text>
        </ion-col>
      </ion-row>
      <ion-row class="trip-route-summary__line">
        <ion-col size="12">
          <ion-text class="trip-route-summary__label">{{ 'RIDE_TRACKING.ARRIVAL' | translate }}</ion-text>
          <ion-text class="trip-route-summary__value">{{ destinationLabel }}</ion-text>
        </ion-col>
      </ion-row>
    </ion-col>
  </ion-row>
</ion-grid>
