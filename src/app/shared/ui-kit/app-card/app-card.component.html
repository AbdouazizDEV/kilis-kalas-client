<ion-card class="app-card">
  @if (title || subtitle) {
    <ion-card-header>
      @if (title) {
        <ion-card-title>{{ title }}</ion-card-title>
      }
      @if (subtitle) {
        <ion-card-subtitle>{{ subtitle }}</ion-card-subtitle>
      }
    </ion-card-header>
  }
  <ion-card-content [class.app-card__content--no-padding]="!padding">
    <ng-content></ng-content>
  </ion-card-content>
</ion-card>
