<ion-content [fullscreen]="true" class="home">
  <ion-grid class="home__layout">
    <ion-row class="home__header-row">
      <ion-col size="3" class="home__header-col home__header-col--menu">
        <ion-button
          type="button"
          fill="clear"
          class="home__menu-btn"
          aria-label="Menu"
          (click)="onMenu()"
        >
          <ion-icon name="menu-outline" class="home__menu-icon"></ion-icon>
        </ion-button>
      </ion-col>

      <ion-col size="6" class="home__header-col home__header-col--brand">
        <ion-grid class="home__brand">
          <ion-row class="home__brand-row ion-align-items-center ion-justify-content-center">
            <ion-col size="auto" class="home__brand-text-col">
              <ion-text class="home__brand-name">{{ 'HOME.BRAND' | translate }}</ion-text>
            </ion-col>
            <ion-col size="auto" class="home__brand-logo-col">
              <ion-img
                src="assets/images/logo1.png"
                alt="Kilis Kalas"
                class="home__brand-logo"
              ></ion-img>
            </ion-col>
          </ion-row>
        </ion-grid>
      </ion-col>

      <ion-col size="3" class="home__header-col home__header-col--spacer" aria-hidden="true"></ion-col>
    </ion-row>

    <ion-row class="home__hero-row">
      <ion-col size="12" class="home__hero-col">
        <ion-text class="home__title">{{ 'HOME.TITLE' | translate }}</ion-text>
        <ion-text class="home__subtitle">{{ 'HOME.SUBTITLE' | translate }}</ion-text>
      </ion-col>
    </ion-row>

    <ion-row class="home__search-row">
      <ion-col size="12" class="home__search-col">
        <ion-button
          type="button"
          fill="clear"
          expand="block"
          class="home__search-bar"
          (click)="onChooseDestination()"
        >
          <ion-grid class="home__search-inner">
            <ion-row class="ion-align-items-center">
              <ion-col size="auto" class="home__search-icon-col">
                <ion-img src="assets/icon/pin-location.svg" alt="" class="home__search-icon"></ion-img>
              </ion-col>
              <ion-col class="home__search-text-col">
                <ion-text class="home__search-placeholder">{{
                  'HOME.SEARCH_PLACEHOLDER' | translate
                }}</ion-text>
              </ion-col>
              <ion-col size="auto" class="home__search-chevron-col">
                <ion-icon name="chevron-forward-outline" class="home__search-chevron"></ion-icon>
              </ion-col>
            </ion-row>
          </ion-grid>
        </ion-button>
      </ion-col>
    </ion-row>

    <ion-row class="home__map-row">
      <ion-col size="12" class="home__map-col">
        <ion-grid class="home__map-card">
          <ion-row class="home__map-preview-row">
            <ion-col size="12" class="home__map-preview-col">
              <app-map-preview class="home__map-preview"></app-map-preview>
            </ion-col>
          </ion-row>

          <ion-row class="home__map-action-row">
            <ion-col size="12" class="home__map-action-col">
              <ion-button
                type="button"
                fill="clear"
                class="home__map-action-btn"
                (click)="onDefineOnMap()"
              >
                <ion-icon name="map-outline" class="home__map-action-icon"></ion-icon>
                <ion-text class="home__map-action-label">{{
                  'HOME.DEFINE_ON_MAP' | translate
                }}</ion-text>
              </ion-button>
            </ion-col>
          </ion-row>
        </ion-grid>
      </ion-col>
    </ion-row>

    <ion-row class="home__options-row">
      <ion-col size="12" class="home__options-col">
        <ion-text class="home__section-label">{{ 'HOME.QUICK_ACTIONS' | translate }}</ion-text>

        <ion-grid class="home__options-grid">
          <ion-row>
            <ion-col size="6" class="home__option-col">
              <ion-button
                type="button"
                fill="clear"
                expand="block"
                class="home__option-card"
                (click)="onDelivery()"
              >
                <ion-grid class="home__option-content">
                  <ion-row class="ion-align-items-center ion-justify-content-center">
                    <ion-col size="12" class="home__option-icon-col">
                      <ion-img
                        src="assets/icon/Motorcycle.svg"
                        alt=""
                        class="home__option-icon home__option-icon--delivery"
                      ></ion-img>
                    </ion-col>
                    <ion-col size="12">
                      <ion-text class="home__option-label">{{ 'HOME.DELIVERY' | translate }}</ion-text>
                    </ion-col>
                  </ion-row>
                </ion-grid>
              </ion-button>
            </ion-col>

            <ion-col size="6" class="home__option-col">
              <ion-button
                type="button"
                fill="clear"
                expand="block"
                class="home__option-card"
                (click)="onOrder()"
              >
                <ion-grid class="home__option-content">
                  <ion-row class="ion-align-items-center ion-justify-content-center">
                    <ion-col size="12" class="home__option-icon-col">
                      <ion-img
                        src="assets/icon/noto_package.svg"
                        alt=""
                        class="home__option-icon home__option-icon--order"
                      ></ion-img>
                    </ion-col>
                    <ion-col size="12">
                      <ion-text class="home__option-label">{{ 'HOME.ORDER' | translate }}</ion-text>
                    </ion-col>
                  </ion-row>
                </ion-grid>
              </ion-button>
            </ion-col>
          </ion-row>
        </ion-grid>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>

<app-side-menu
  [isOpen]="isMenuOpen"
  (closed)="closeMenu()"
  (menuAction)="onMenuAction($event)"
></app-side-menu>
