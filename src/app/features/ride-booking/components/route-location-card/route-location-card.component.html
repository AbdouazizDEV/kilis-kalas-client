<ion-grid class="route-location-card">
  <ion-row class="route-location-card__row">
    <ion-col size="auto" class="route-location-card__track-col">
      <div class="route-location-card__track">
        <span class="route-location-card__pickup-dot" aria-hidden="true"></span>
        <span class="route-location-card__connector" aria-hidden="true"></span>
        <ion-icon name="location-outline" class="route-location-card__destination-icon" aria-hidden="true"></ion-icon>
      </div>
    </ion-col>

    <ion-col class="route-location-card__fields-col">
      <button
        type="button"
        class="route-location-card__field"
        [class.route-location-card__field--active]="activeField === 'pickup'"
        (click)="onFieldClick('pickup')"
      >
        <ion-text
          class="route-location-card__field-text"
          [class.route-location-card__field-text--filled]="!!pickup"
        >
          {{
            pickup?.label ||
              (activeField === 'pickup'
                ? ('RIDE_BOOKING.CHOOSE_PICKUP' | translate)
                : ('RIDE_BOOKING.CURRENT_POSITION' | translate))
          }}
        </ion-text>
      </button>

      <div
        class="route-location-card__field route-location-card__field--destination"
        [class.route-location-card__field--active]="activeField === 'destination'"
        (click)="onFieldClick('destination')"
      >
        @if (activeField === 'destination') {
          @if (!destination) {
            <span class="route-location-card__cursor" aria-hidden="true">|</span>
          }
          <input
            type="text"
            class="route-location-card__input"
            [value]="destinationQuery"
            [placeholder]="'RIDE_BOOKING.SEARCH_PLACEHOLDER' | translate"
            (input)="onDestinationInput($event)"
            (click)="$event.stopPropagation()"
          />
        } @else {
          <ion-text class="route-location-card__field-text route-location-card__field-text--filled">
            {{ destination?.label || ('RIDE_BOOKING.SEARCH_PLACEHOLDER' | translate) }}
          </ion-text>
        }
      </div>
    </ion-col>
  </ion-row>
</ion-grid>
